<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0f172a" />
<title>TKD Footwork Trainer — 30 Day</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ===================== HOME ===================== -->
<section id="home" class="screen active">
  <h1 class="title">🥋 Footwork Trainer</h1>
  <p class="subtitle">Back &nbsp;→&nbsp; In &nbsp;→&nbsp; Kick &nbsp;→&nbsp; Reset</p>

  <div class="day-big" id="homeDay">1</div>
  <div class="day-label" id="homeDayLabel">DAY 1 / 30</div>

  <button class="start-btn" id="startBtn">Start 10-Min Training</button>

  <div class="note" id="homeNote"></div>

  <div class="dots" id="dots"></div>
</section>

<!-- ===================== TRAINING ===================== -->
<section id="train" class="screen">
  <div class="train-top">
    <div class="timer" id="timer">10:00</div>
    <div class="train-meta">
      <div class="phase-pill" id="phasePill">LEVEL 1</div>
      <div style="margin-top:4px;">Cycles: <span id="cycleCount">0</span></div>
      <div style="margin-top:6px; display:flex; gap:6px; justify-content:flex-end;">
        <button class="quit" id="soundBtn" title="Sound on/off">🔊</button>
        <button class="quit" id="quitBtn">Quit</button>
      </div>
    </div>
  </div>
  <div class="time-bar"><i id="timeFill"></i></div>

  <div class="cue" id="cue">
    <div class="cue-arrow" id="cueArrow">⬇️</div>
    <div class="cue-text" id="cueText">GET READY</div>
    <div class="cue-sub" id="cueSub">FOLLOW ALONG</div>
    <div class="cue-bar"><i id="cueFill"></i></div>
  </div>
</section>

<!-- ===================== DAY COMPLETE ===================== -->
<section id="done" class="screen">
  <div class="big-emoji">🏆</div>
  <h2 class="done-title">Day Complete!</h2>
  <div class="streak" id="doneStreak">Day 1 done</div>
  <div class="note">Great discipline. The next day unlocks <b>tomorrow</b>.</div>
  <button class="ghost-btn" id="doneHomeBtn">Back to Home</button>
</section>

<!-- ===================== PROGRAM COMPLETE ===================== -->
<section id="allDone" class="screen">
  <div class="big-emoji">🎉🥋</div>
  <h2 class="done-title">30 Days Done!</h2>
  <div class="streak">You built the habit. Black-belt brain. 🖤</div>
  <button class="ghost-btn" id="resetProgramBtn">Start a New 30 Days</button>
</section>

<script src="app.js"></script>
</body>
</html>
